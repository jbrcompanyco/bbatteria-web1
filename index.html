  --margin-action-normal-vertical: 24; /* @kind spacing */
  --margin-content-content: 24; /* @kind spacing */
  --margin-navigation-horizontal: 20; /* @kind spacing */
  --margin-navigation-normal: 20; /* @kind spacing */
  --margin-navigation-text: 4; /* @kind spacing */
  --margin-navigation-tool-tab: 16; /* @kind spacing */
  --padding-horizontal: 20; /* @kind spacing */
  --padding-vertical: 4; /* @kind spacing */
  --radius-2: 16; /* @kind radius */
  --radius-3: 16; /* @kind radius */
  --radius: 20; /* @kind radius */
  --width-max: 1060; /* @kind spacing */
  --width-min: 320; /* @kind spacing */
  --width-normal: 480; /* @kind spacing */
}

:root[data-mode="xlarge"] {
  --height-popup-max: 760; /* @kind spacing */
  --margin-action-contents-bottom: 0; /* @kind spacing */
  --margin-action-normal-horizontal: 32; /* @kind spacing */
  --margin-action-normal-vertical: 24; /* @kind spacing */
  --margin-content-content: 32; /* @kind spacing */
  --margin-navigation-horizontal: 28; /* @kind spacing */
  --margin-navigation-normal: 24; /* @kind spacing */
  --margin-navigation-text: 4; /* @kind spacing */
  --margin-navigation-tool-tab: 20; /* @kind spacing */
  --padding-horizontal: 24; /* @kind spacing */
  --padding-vertical: 8; /* @kind spacing */
  --radius-2: 20; /* @kind radius */
  --radius-3: 20; /* @kind radius */
  --radius: 20; /* @kind radius */
  --width-max: 1060; /* @kind spacing */
  --width-min: 320; /* @kind spacing */

:root[data-mode="dim"] {

:root[data-theme="light"], .light {
  --labels-vibrant-controls-primary: rgb(64,64,64); /* @kind color */
  --mode-2: "IC - Light"; /* @kind other */
}

/* ===== Wanted DS: typography ===== */
/* ============================================================
   Wanted Design System — Typography
   7 hierarchy levels, 18 sub-steps. Base typeface Pretendard JP.
   Korean naming preserved: Display / Title / Heading / Headline
   / Body / Label / Caption.
   ============================================================ */

:root {
  /* Font families */
  --font-sans: "Pretendard JP Variable", "Pretendard JP", -apple-system,
    BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-display: "Wanted Sans Variable", "Wanted Sans", var(--font-sans);
  --font-mono: "SF Mono", ui-monospace, SFMono-Regular, Menlo, Consolas,
    "Liberation Mono", monospace;

  /* Weights (Pretendard JP variable axis) */
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* ---- Type scale: size / line-height / letter-spacing ---- */
  --display1-size: 56px;   --display1-lh: 72px;  --display1-ls: -0.017em;
  --display2-size: 40px;   --display2-lh: 52px;  --display2-ls: -0.0282em;
  --display3-size: 36px;   --display3-lh: 48px;  --display3-ls: -0.027em;

  --title1-size: 32px;     --title1-lh: 44px;    --title1-ls: -0.0253em;
  --title2-size: 28px;     --title2-lh: 38px;    --title2-ls: -0.0236em;
  --title3-size: 24px;     --title3-lh: 32px;    --title3-ls: -0.023em;

  --heading1-size: 22px;   --heading1-lh: 30px;  --heading1-ls: -0.0194em;
  --heading2-size: 20px;   --heading2-lh: 28px;  --heading2-ls: -0.012em;

  --headline1-size: 18px;  --headline1-lh: 26px; --headline1-ls: -0.002em;
  --headline2-size: 17px;  --headline2-lh: 24px; --headline2-ls: 0em;

  --body1-size: 16px;      --body1-lh: 24px;     --body1-ls: 0.0057em;
  --body1-reading-lh: 26px;
  --body2-size: 15px;      --body2-lh: 22px;     --body2-ls: 0.0096em;
  --body2-reading-lh: 24px;

  --label1-size: 14px;     --label1-lh: 20px;    --label1-ls: 0.0145em;
  --label1-reading-lh: 22px;
  --label2-size: 13px;     --label2-lh: 18px;    --label2-ls: 0.0194em;

  --caption1-size: 12px;   --caption1-lh: 16px;  --caption1-ls: 0.0252em;
  --caption2-size: 11px;   --caption2-lh: 14px;  --caption2-ls: 0.0311em;
}

/* ---- Utility classes ---- */
.wt-display1 { font: var(--weight-bold) var(--display1-size)/var(--display1-lh) var(--font-sans); letter-spacing: var(--display1-ls); }
.wt-display2 { font: var(--weight-bold) var(--display2-size)/var(--display2-lh) var(--font-sans); letter-spacing: var(--display2-ls); }
.wt-display3 { font: var(--weight-bold) var(--display3-size)/var(--display3-lh) var(--font-sans); letter-spacing: var(--display3-ls); }

.wt-title1 { font: var(--weight-bold) var(--title1-size)/var(--title1-lh) var(--font-sans); letter-spacing: var(--title1-ls); }
.wt-title2 { font: var(--weight-bold) var(--title2-size)/var(--title2-lh) var(--font-sans); letter-spacing: var(--title2-ls); }
.wt-title3 { font: var(--weight-bold) var(--title3-size)/var(--title3-lh) var(--font-sans); letter-spacing: var(--title3-ls); }

.wt-heading1 { font: var(--weight-bold) var(--heading1-size)/var(--heading1-lh) var(--font-sans); letter-spacing: var(--heading1-ls); }
.wt-heading2 { font: var(--weight-bold) var(--heading2-size)/var(--heading2-lh) var(--font-sans); letter-spacing: var(--heading2-ls); }

.wt-headline1 { font: var(--weight-semibold) var(--headline1-size)/var(--headline1-lh) var(--font-sans); letter-spacing: var(--headline1-ls); }
.wt-headline2 { font: var(--weight-semibold) var(--headline2-size)/var(--headline2-lh) var(--font-sans); letter-spacing: var(--headline2-ls); }

.wt-body1 { font: var(--weight-medium) var(--body1-size)/var(--body1-lh) var(--font-sans); letter-spacing: var(--body1-ls); }
.wt-body1-reading { font: var(--weight-medium) var(--body1-size)/var(--body1-reading-lh) var(--font-sans); letter-spacing: var(--body1-ls); }
.wt-body2 { font: var(--weight-medium) var(--body2-size)/var(--body2-lh) var(--font-sans); letter-spacing: var(--body2-ls); }
.wt-body2-reading { font: var(--weight-medium) var(--body2-size)/var(--body2-reading-lh) var(--font-sans); letter-spacing: var(--body2-ls); }

.wt-label1 { font: var(--weight-medium) var(--label1-size)/var(--label1-lh) var(--font-sans); letter-spacing: var(--label1-ls); }
.wt-label1-reading { font: var(--weight-medium) var(--label1-size)/var(--label1-reading-lh) var(--font-sans); letter-spacing: var(--label1-ls); }
.wt-label2 { font: var(--weight-medium) var(--label2-size)/var(--label2-lh) var(--font-sans); letter-spacing: var(--label2-ls); }

.wt-caption1 { font: var(--weight-medium) var(--caption1-size)/var(--caption1-lh) var(--font-sans); letter-spacing: var(--caption1-ls); }
.wt-caption2 { font: var(--weight-medium) var(--caption2-size)/var(--caption2-lh) var(--font-sans); letter-spacing: var(--caption2-ls); }

/* ===== Wanted DS: scale ===== */
/* ============================================================
   Wanted Design System — Spacing, Radius, Shadow, Layout
   Concrete px tokens for easy consumption. The raw Figma
   variable floats live in fig-tokens.css (unitless).
   ============================================================ */

:root {
  /* ---- Spacing scale (px) ---- */
  --space-2: 2px;
  --space-4: 4px;
  --space-6: 6px;
  --space-8: 8px;
  --space-10: 10px;
  --space-12: 12px;
  --space-16: 16px;
  --space-20: 20px;
  --space-24: 24px;
  --space-28: 28px;
  --space-32: 32px;
  --space-40: 40px;
  --space-48: 48px;
  --space-56: 56px;
  --space-64: 64px;
  --space-80: 80px;

  /* ---- Corner radius (px) ---- */
  --radius-4: 4px;
  --radius-6: 6px;
  --radius-8: 8px;     /* compact controls: small buttons, chips, badges */
  --radius-10: 10px;   /* default control radius: buttons, inputs */
  --radius-12: 12px;   /* cards, popovers */
  --radius-16: 16px;   /* large cards, sheets */
  --radius-20: 20px;   /* hero surfaces */
  --radius-24: 24px;
  --radius-full: 9999px;

  /* ---- Elevation / shadow ---- */
  /* Wanted shadows are low-spread, near-black, very soft. */
  --shadow-normal:
    0 1px 2px rgba(0, 0, 0, 0.06),
    0 0 1px rgba(23, 23, 23, 0.07);
  --shadow-emphasize:
    0 1px 4px rgba(0, 0, 0, 0.08),
    0 0 1px rgba(23, 23, 23, 0.10);
  --shadow-strong:
    0 4px 16px rgba(0, 0, 0, 0.08),
    0 0 1px rgba(23, 23, 23, 0.10);
  --shadow-heavy:
    0 8px 28px rgba(0, 0, 0, 0.12),
    0 1px 2px rgba(23, 23, 23, 0.06);

  /* Hairline borders use the fill/line semantic tokens from fig-tokens. */
  --border-hairline: 1px solid var(--line-normal-normal);
  --border-neutral: 1px solid var(--line-normal-neutral);

  /* ---- Layout ---- */
  --layout-max: 1060px;     /* primary content max width */
  --layout-wide: 1200px;
  --layout-gutter: 20px;
  --duration-fast: 120ms; /* @kind other */
  --duration-base: 200ms; /* @kind other */
  --easing-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */
  --easing-emphasized: cubic-bezier(0.2, 0, 0, 1); /* @kind other */
}

/* ===== Wanted DS: base ===== */
/* ============================================================
   Wanted Design System — Base
   Light global defaults. Opt-in: scope under .wt-root if you
   don't want these touching a host page.
   ============================================================ */

.wt-root,
body.wt-body {
  font: var(--weight-medium) var(--body1-size)/var(--body1-lh) var(--font-sans);
  letter-spacing: var(--body1-ls);
  color: var(--label-normal);
  background: var(--background-normal-normal);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.wt-root *,
.wt-root *::before,
.wt-root *::after {
  box-sizing: border-box;
}

/* ===== Finder ===== */
/* =========================================================
   빠떼리아 배터리 검색 도구 — Wanted DS tokens + RED primary
   단일 화면 인터랙티브 파인더. 반응형(데스크탑/모바일).
   ========================================================= */

:root{
  --bb-red:#E2231A;
  --bb-red-strong:#B00C0C;
  --bb-red-soft:#FDECEC;
  --bb-agm:#E8730C;
  --bb-agm-soft:#FFF3E8;
  --bb-ink:#171717;
  --bb-charcoal:#16171A;
}

/* Map Wanted primary token → brand red so DS components inherit it */
.bb-finder.wt-root,
.bb-finder.wt-root *{
  --primary-normal:#E2231A;
  --primary-strong:#B00C0C;
  --primary-heavy:#7A0606;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body.bb-body{
  background:#EDEEF0;overflow-x:clip;
  font-family:"Pretendard JP Variable","Pretendard JP",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:var(--bb-ink);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}

.bb-finder{max-width:840px;margin:0 auto;padding:0 0 64px;}

/* ---------------- header ---------------- */
.bb-top{
  background:var(--bb-charcoal);color:#fff;padding:30px 32px 28px;
  border-radius:0 0 24px 24px;position:relative;z-index:10;
  box-shadow:0 6px 24px rgba(0,0,0,.18);
}
.bb-top .row{display:flex;align-items:center;gap:14px;}
.bb-top .logo{height:30px;width:auto;}
.bb-top .badge-pill{
  display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
  background:rgba(255,255,255,.12);border-radius:9999px;padding:7px 14px;
  font-size:12.5px;font-weight:600;color:rgba(255,255,255,.82);
}
.bb-top .badge-pill .dot{width:7px;height:7px;border-radius:50%;background:#39D353;}
.bb-top h1{
  margin:18px 0 6px;font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.28;
  text-align:left;word-break:keep-all;
}
.bb-top h1 .red{color:#FF6A6A;}
.bb-top .sub{
  font-size:14px;font-weight:500;color:rgba(255,255,255,.66);line-height:1.6;
  text-align:left;word-break:keep-all;
}

/* ---------------- panel ---------------- */
.bb-panel{
  background:#fff;border-radius:18px;box-shadow:var(--shadow-strong);
  margin:18px 20px 0;padding:24px 24px 26px;
  position:sticky;top:10px;z-index:30;
}
/* sticky 패널 뒤 배경 가림 (결과가 둥근 모서리 위로 비치지 않게) */
.bb-panel::before{
  content:"";position:absolute;left:-20px;right:-20px;top:-18px;bottom:-12px;
  background:#EDEEF0;z-index:-1;
}
@media(max-width:560px){ .bb-panel{margin:14px 12px 0;padding:20px 16px 22px;position:static;} }

.bb-step-label{
  display:flex;align-items:center;gap:9px;margin-bottom:13px;
  font-size:13px;font-weight:800;letter-spacing:.01em;color:rgba(55,56,60,.61);
}
.bb-step-label .n{
  width:21px;height:21px;border-radius:50%;background:var(--bb-red);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;
}

/* maker chips */
.bb-makers{display:flex;flex-wrap:wrap;gap:9px;}
.bb-maker{
  flex:1 1 0;min-width:120px;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:14px 10px;border:1.5px solid rgba(112,115,124,.22);border-radius:14px;
  background:#fff;cursor:pointer;transition:all .14s cubic-bezier(.4,0,.2,1);
  font-family:inherit;
}
.bb-maker:hover{border-color:rgba(112,115,124,.4);background:rgba(112,115,124,.04);}
.bb-maker.on{border-color:var(--bb-red);background:var(--bb-red-soft);box-shadow:0 0 0 1px var(--bb-red) inset;}
.bb-maker .mk-ko{font-size:15px;font-weight:800;color:var(--bb-ink);letter-spacing:-.01em;}
.bb-maker.on .mk-ko{color:var(--bb-red-strong);}
.bb-maker .mk-en{font-size:10.5px;font-weight:600;color:rgba(55,56,60,.4);letter-spacing:.04em;}
.bb-maker .mk-cnt{font-size:10.5px;font-weight:600;color:rgba(55,56,60,.4);}
.bb-maker.on .mk-cnt{color:var(--bb-red);}

/* controls row */
.bb-controls{margin-top:18px;display:flex;flex-direction:column;gap:14px;}
.bb-search{position:relative;}
.bb-search input{
  width:100%;height:50px;border:1.5px solid rgba(112,115,124,.22);border-radius:12px;
  padding:0 16px 0 46px;font-size:16px;font-weight:500;font-family:inherit;color:var(--bb-ink);
  background:#fff;outline:none;transition:border-color .14s;
}
.bb-search input:focus{border-color:var(--bb-red);box-shadow:0 0 0 3px rgba(226,35,26,.12);}
.bb-search input::placeholder{color:rgba(55,56,60,.4);font-weight:500;}
.bb-search .ic{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:rgba(55,56,60,.5);width:22px;height:22px;}
.bb-search .clr{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:26px;height:26px;border-radius:50%;border:0;background:rgba(112,115,124,.14);
  color:rgba(55,56,60,.6);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;
}

.bb-selects{display:flex;gap:14px;align-items:flex-start;}
@media(max-width:560px){ .bb-selects{flex-direction:column;} }
.bb-field{flex:1;min-width:0;}
/* 차종 좁게, 유종 넓게 — 유종 칩 6개 한 줄 */
.bb-selects > .bb-field:first-child{flex:0 0 190px;}
.bb-selects > .bb-field:last-child{flex:1;}
@media(max-width:560px){ .bb-selects > .bb-field:first-child{flex:1;} }
.bb-fuels{flex-wrap:nowrap;}
.bb-field .lab{font-size:12px;font-weight:700;color:rgba(55,56,60,.61);margin-bottom:6px;display:block;}
.bb-select{
  position:relative;width:100%;
}
.bb-select select{
  width:100%;height:46px;border:1.5px solid rgba(112,115,124,.22);border-radius:11px;
  padding:0 38px 0 14px;font-size:15px;font-weight:600;font-family:inherit;color:var(--bb-ink);
  background:#fff;outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;
  transition:border-color .14s;
}
.bb-select select:focus{border-color:var(--bb-red);}
.bb-select::after{
  content:"";position:absolute;right:15px;top:50%;width:9px;height:9px;
  border-right:2px solid rgba(55,56,60,.5);border-bottom:2px solid rgba(55,56,60,.5);
  transform:translateY(-65%) rotate(45deg);pointer-events:none;
}

/* fuel chips */
.bb-fuels{display:flex;flex-wrap:wrap;gap:7px;}
.bb-chip{
  border:1.5px solid rgba(112,115,124,.22);background:#fff;border-radius:9999px;
  padding:8px 15px;font-size:13.5px;font-weight:700;color:rgba(55,56,60,.7);
  cursor:pointer;font-family:inherit;transition:all .12s;
}
.bb-chip:hover{border-color:rgba(112,115,124,.4);}
.bb-chip.on{border-color:var(--bb-red);background:var(--bb-red);color:#fff;}
/* 모바일: 유종 칩 6개 한 줄 (기본 규칙 뒤에 둬서 우선 적용) */
@media(max-width:560px){
  .bb-fuels{flex-wrap:nowrap;gap:4px;justify-content:space-between;}
  .bb-chip{padding:7px 7px;font-size:12px;white-space:nowrap;}
}

/* ---------------- results ---------------- */
.bb-results{margin:18px 20px 0;}
@media(max-width:560px){ .bb-results{margin:14px 12px 0;} }
.bb-rcount{
  display:flex;align-items:baseline;gap:6px;padding:6px 4px 14px;white-space:nowrap;
}
.bb-rcount .num{font-size:20px;font-weight:800;color:var(--bb-red);}
.bb-rcount .txt{font-size:14px;font-weight:600;color:rgba(55,56,60,.61);}

.bb-card{
  background:#fff;border-radius:16px;box-shadow:var(--shadow-normal);
  border:1px solid rgba(112,115,124,.12);padding:18px 20px;margin-bottom:12px;
}
.bb-card .chead{display:flex;align-items:center;gap:8px;margin-bottom:15px;flex-wrap:nowrap;min-width:0;}
.bb-card .grp{
  flex:none;font-size:11px;font-weight:800;color:#fff;background:var(--bb-charcoal);
  border-radius:6px;padding:3px 8px;letter-spacing:-.01em;white-space:nowrap;
}
.bb-card .model{flex:1 1 auto;min-width:0;font-size:15px;font-weight:800;color:var(--bb-ink);letter-spacing:-.015em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bb-card .meta{flex:none;margin-left:auto;display:flex;gap:5px;}
.bb-tag{
  white-space:nowrap;font-size:11px;font-weight:700;border-radius:6px;padding:3px 8px;
  background:rgba(112,115,124,.1);color:rgba(55,56,60,.72);
}
.bb-tag.year{background:rgba(112,115,124,.1);}
.bb-tag.fuel{background:var(--bb-red-soft);color:var(--bb-red-strong);}
@media(max-width:560px){
  .bb-top{padding:22px 18px 20px;}
  .bb-top h1{font-size:21px;margin:14px 0 6px;line-height:1.3;}
  .bb-top .sub{font-size:13px;}
  .bb-card{padding:16px 15px;}
  .bb-card .chead{gap:6px;}
  .bb-card .model{font-size:14px;}
  .bb-tag{font-size:10.5px;padding:3px 7px;}
}

.bb-specs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
@media(max-width:560px){ .bb-specs{grid-template-columns:repeat(2,1fr);} }
.bb-spec{
  border:1px solid rgba(112,115,124,.16);border-radius:11px;padding:11px 10px;text-align:center;
  background:#FAFAFB;
}
.bb-spec .bn{font-size:11px;font-weight:700;color:rgba(55,56,60,.5);margin-bottom:5px;letter-spacing:.01em;}
.bb-spec .sv{font-size:16px;font-weight:800;color:var(--bb-ink);letter-spacing:-.01em;font-variant-numeric:tabular-nums;}
.bb-spec.is-agm{background:var(--bb-agm-soft);border-color:rgba(232,115,12,.28);}
.bb-spec.is-agm .sv{color:var(--bb-agm);}
.bb-spec.is-none .sv{color:rgba(55,56,60,.28);}
.bb-spec .agm-flag{
  display:inline-block;margin-top:4px;font-size:9.5px;font-weight:800;color:#fff;background:var(--bb-agm);
  border-radius:5px;padding:1px 6px;letter-spacing:.04em;
}

/* empty / prompt states */
.bb-empty{
  text-align:center;padding:54px 24px;color:rgba(55,56,60,.5);
  background:#fff;border-radius:16px;border:1px dashed rgba(112,115,124,.28);
}
.bb-empty .em-ic{font-size:40px;margin-bottom:12px;}
.bb-empty .em-t{font-size:16px;font-weight:700;color:rgba(55,56,60,.7);margin-bottom:5px;}
.bb-empty .em-s{font-size:13.5px;font-weight:500;line-height:1.6;}

.bb-more{
  width:100%;height:52px;border:1.5px solid rgba(112,115,124,.22);border-radius:12px;
  background:#fff;font-size:15px;font-weight:700;color:var(--bb-ink);cursor:pointer;font-family:inherit;
  transition:all .12s;
}
.bb-more:hover{border-color:var(--bb-red);color:var(--bb-red);}

/* legend + footer */
.bb-legend{
  margin:18px 24px 0;padding:13px 20px;background:#fff;border-radius:12px;
  font-size:13px;font-weight:600;color:rgba(55,56,60,.66);box-shadow:var(--shadow-normal);

<script>
/* ===== app ===== */
/* 빠떼리아 배터리 검색 앱 — React + Wanted DS components */
const { useState, useMemo, useEffect } = React;
const DS = window.WantedDesignSystem_ad8d48 || {};
const { Tabs, TextField, Tag, Badge, Button, Card } = DS;
const DATA = window.BBATTERY;

const SearchIcon = () => (
  React.createElement("svg", { viewBox:"0 0 24 24", fill:"none", width:22, height:22 },
    React.createElement("circle", { cx:11, cy:11, r:7, stroke:"currentColor", strokeWidth:2 }),
    React.createElement("path", { d:"M20 20l-3.2-3.2", stroke:"currentColor", strokeWidth:2, strokeLinecap:"round" })
  )
);

const FUEL_ORDER = ["가솔린","디젤","LPG","하이브리드","전기"];
function fuelTokens(s){ return s.split("/").map(t=>t.replace(/\(.*?\)/g,"").trim()).filter(Boolean); }
function isAGM(v){ return /^AGM/.test(v); }
function isNone(v){ return v === "—" || v === "-" || v === ""; }

// 한글 쌍자음(겹자음)을 홑자음으로 정규화 — '쏘나타'를 '소나타'로 검색 가능하게
function normalizeKo(s){
  const LEAD = {1:0, 4:3, 8:7, 10:9, 13:12};   // 초성 ㄲ→ㄱ ㄸ→ㄷ ㅃ→ㅂ ㅆ→ㅅ ㅉ→ㅈ
  const TAIL = {2:1, 20:19};                    // 종성 ㄲ→ㄱ ㅆ→ㅅ
  let out = "";
  for(const ch of s){
    const code = ch.charCodeAt(0) - 0xAC00;
    if(code >= 0 && code <= 11171){
      let lead = Math.floor(code/588), rest = code%588;
      let vowel = Math.floor(rest/28), tail = rest%28;
      if(LEAD[lead] !== undefined) lead = LEAD[lead];
      if(TAIL[tail] !== undefined) tail = TAIL[tail];
      // ㅈ/ㅊ 뒤의 ㅕ→ㅓ, ㅖ→ㅔ — '그랜져'를 '그랜저'로 검색 가능하게
      if(lead === 12 || lead === 14){
        if(vowel === 6) vowel = 4;       // ㅕ→ㅓ (져→저)
        else if(vowel === 7) vowel = 5;  // ㅖ→ㅔ (졔→제)
      }
      out += String.fromCharCode(0xAC00 + (lead*21+vowel)*28 + tail);
    } else {
      out += ch;
    }
  }
  return out;
}

function SpecCell({ brand, value }){
  const none = isNone(value);
  return React.createElement("div", { className:"bb-spec"+(none?" is-none":"") },
    React.createElement("div", { className:"bb-bn", style:{fontSize:"11px",fontWeight:700,color:"rgba(55,56,60,.5)",marginBottom:"5px"} }, brand),
    React.createElement("div", { className:"sv" }, none ? "없음" : value)
  );
}

function ResultCard({ row }){
  const [grp, model, year, fuel, d, r, h, x] = row;
  return React.createElement(Card, { variant:"shadow", padding:"none", className:"bb-card" },
    React.createElement("div", { className:"chead" },
      React.createElement("span", { className:"grp" }, grp),
      React.createElement("span", { className:"model" }, model),
      React.createElement("div", { className:"meta" },
        React.createElement("span", { className:"bb-tag year" }, "연식: "+year),
        React.createElement("span", { className:"bb-tag fuel" }, "유종: "+fuel)
      )
    ),
    React.createElement("div", { className:"bb-specs" },
      React.createElement(SpecCell, { brand:"Delkor", value:d }),
      React.createElement(SpecCell, { brand:"ROCKET", value:r }),
      React.createElement(SpecCell, { brand:"Hankook", value:h }),
      React.createElement(SpecCell, { brand:"X-PRO", value:x })
    )
  );
}

function App(){
  const [maker, setMaker] = useState("hyundai");
  const [query, setQuery] = useState("");
  const [carType, setCarType] = useState("all");
  const [fuel, setFuel] = useState("all");
  const [limit, setLimit] = useState(20);

  const rows = DATA[maker] || [];

  // unique car types for current maker
  const carTypes = useMemo(()=>{
    const seen = []; rows.forEach(r=>{ if(!seen.includes(r[0])) seen.push(r[0]); }); return seen;
  }, [maker]);

  // fuel options present in current maker+carType selection
  const fuelOpts = useMemo(()=>{
    const set = new Set();
    rows.forEach(r=>{ if(carType==="all"||r[0]===carType){ fuelTokens(r[3]).forEach(f=>set.add(f)); } });
    return FUEL_ORDER.filter(f=>set.has(f));
  }, [maker, carType]);

  const filtered = useMemo(()=>{
    const q = normalizeKo(query.trim().toLowerCase().replace(/\s+/g,""));
    return rows.filter(r=>{
      if(carType!=="all" && r[0]!==carType) return false;
      if(fuel!=="all" && !fuelTokens(r[3]).includes(fuel)) return false;
      if(q){
        const hay = normalizeKo((r[0]+r[1]+r[4]+r[5]+r[6]+r[7]).toLowerCase().replace(/\s+/g,""));
        if(!hay.includes(q)) return false;
      }
      return true;
    });
  }, [maker, query, carType, fuel]);

  // reset dependent filters when maker changes
  useEffect(()=>{ setCarType("all"); setFuel("all"); setLimit(20); }, [maker]);
  useEffect(()=>{ setFuel("all"); setLimit(20); }, [carType]);
  useEffect(()=>{ setLimit(20); }, [query, fuel]);

  const shown = filtered.slice(0, limit);
  const makerItems = DATA.makers.map(m=>({
    value:m.id,
    label: React.createElement(React.Fragment, null,
      React.createElement("span", { className:"mk-full" }, m.name),
      React.createElement("span", { className:"mk-short" }, m.short || m.name)
    ),
    count:(DATA[m.id]||[]).length
  }));

  return React.createElement(React.Fragment, null,
    // header
    React.createElement("header", { className:"bb-top" },
      React.createElement("div", { className:"row" },
        React.createElement("img", { className:"logo", src:(window.BB_LOGO||"../../assets/logo-white.png"), alt:"빠떼리아" }),
        React.createElement("span", { className:"badge-pill" },
          React.createElement("span", { className:"dot" }), "정품 새제품만 취급"
        )
      ),
      React.createElement("h1", null, "내 차에 맞는 ", React.createElement("span",{className:"red"},"배터리 규격"), "을 한 번에"),
      React.createElement("p", { className:"sub" }, "제조사 · 차종 · 유종을 선택하면 브랜드별 배터리 규격을 바로 확인할 수 있어요.")
    ),

    // panel: maker + controls
    React.createElement("div", { className:"bb-panel" },
      React.createElement("div", { className:"bb-step-label" },
        React.createElement("span",{className:"n"},"1"), "제조사 선택"),
      React.createElement(Tabs, { items:makerItems, value:maker, onChange:setMaker, fill:true }),

      React.createElement("div", { className:"bb-controls" },
        React.createElement("div", { className:"bb-step-label", style:{marginTop:"4px",marginBottom:"0"} },
          React.createElement("span",{className:"n"},"2"), "차종 검색 또는 선택"),
        React.createElement("div", { className:"bb-search" },
          React.createElement("span", { className:"ic" }, React.createElement(SearchIcon)),
          React.createElement("input", {
            type:"text", value:query, placeholder:"차종 · 모델명 · 규격으로 검색 (예: 그랜저, K5, DIN74L)",
            onChange:e=>setQuery(e.target.value), "aria-label":"검색"
          }),
          query ? React.createElement("button", { className:"clr", onClick:()=>setQuery(""), "aria-label":"지우기" }, "✕") : null
        ),
        React.createElement("div", { className:"bb-selects" },
          React.createElement("div", { className:"bb-field" },
            React.createElement("label", { className:"lab" }, "차종"),
            React.createElement("div", { className:"bb-select" },
              React.createElement("select", { value:carType, onChange:e=>setCarType(e.target.value) },
                React.createElement("option", { value:"all" }, "전체 차종"),
                carTypes.map(c=>React.createElement("option", { key:c, value:c }, c))
              )
            )
          ),
          React.createElement("div", { className:"bb-field" },
            React.createElement("label", { className:"lab" }, "유종"),
            React.createElement("div", { className:"bb-fuels" },
              React.createElement("button", { className:"bb-chip"+(fuel==="all"?" on":""), onClick:()=>setFuel("all") }, "전체"),
              fuelOpts.map(f=>React.createElement("button", {
                key:f, className:"bb-chip"+(fuel===f?" on":""), onClick:()=>setFuel(f)
              }, f))
            )
          )
        )
      )
    ),

    // legend
    React.createElement("div", { className:"bb-legend" },
      React.createElement("span", { className:"disc" },
        "순정 기준 실제 장착 배터리와 다를 수 있습니다. ",
        React.createElement("b", null, "구매 전 기존 장착되어 있는 배터리 규격을 다시 한번 확인하세요."))
    ),

    // results
    React.createElement("div", { className:"bb-results" },
      React.createElement("div", { className:"bb-rcount" },
        React.createElement("span", { className:"num" }, filtered.length),
        React.createElement("span", { className:"txt" }, "개 결과")
      ),
      filtered.length === 0
        ? React.createElement("div", { className:"bb-empty" },
            React.createElement("div", { className:"em-ic" }, "🔍"),
            React.createElement("div", { className:"em-t" }, "검색 결과가 없어요"),
            React.createElement("div", { className:"em-s" }, "다른 키워드로 검색하거나 차종 · 유종 필터를 변경해 보세요.")
          )
        : React.createElement(React.Fragment, null,
            shown.map((r,i)=>React.createElement(ResultCard, { key:maker+i, row:r })),
            filtered.length > limit
              ? React.createElement("button", { className:"bb-more", onClick:()=>setLimit(limit+20) },
                  "결과 더보기 ("+(filtered.length-limit)+"개 남음)")
              : null
          )
    ),

    // footer
    React.createElement("div", { className:"bb-foot" },
      React.createElement("p", { className:"note" },
        "규격이 헷갈리거나 목록에 없는 차종은 전화로 문의해 주세요.", React.createElement("br"),
        "기존 장착 배터리 규격을 확인 후 주문하시는 것을 권장합니다."),
      React.createElement("a", { className:"cta", href:"tel:070-8150-4512" },
        "📞 배터리 문의 ", React.createElement("span",{className:"red"},"070-8150-4512"))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
